apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-worker
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-worker
  template:
    metadata:
      labels:
        app: airflow-worker
    spec:
      serviceAccountName: airflow
      initContainers:
        - name: wait-for-init          # ← 1. Tunggu DB migrate selesai
          image: bitnami/kubectl:latest
          command:
            - kubectl
            - wait
            - --for=condition=complete
            - job/airflow-init
            - --timeout=300s
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do echo "waiting for redis…"; sleep 3; done
        - name: git-sync-init
          image: registry.k8s.io/git-sync/git-sync:v4.4.0
          envFrom:
            - configMapRef:
                name: git-sync-config
          env:
            - name: GITSYNC_ONE_TIME
              value: "true"
            - name: GITSYNC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: git-sync-secret
                  key: username
            - name: GITSYNC_PASSWORD_FILE
              value: /etc/git-secret/password
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
            - name: git-sync-secret-volume
              mountPath: /etc/git-secret
              readOnly: true
      containers:
        - name: worker
          image: apache/airflow:3.0.6-python3.12
          imagePullPolicy: IfNotPresent
          command: ["bash", "-ec", "exec airflow celery worker"]
          ports:
            - containerPort: 8793
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secret
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
            - name: airflow-logs
              mountPath: /opt/airflow/logs
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.4.0
          envFrom:
            - configMapRef:
                name: git-sync-config
          env:
            - name: GITSYNC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: git-sync-secret
                  key: username
            - name: GITSYNC_PASSWORD_FILE
              value: /etc/git-secret/password
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
            - name: git-sync-secret-volume
              mountPath: /etc/git-secret
              readOnly: true
      volumes:
        - name: git-sync-data
          emptyDir: {}
        - name: airflow-logs
          emptyDir: {}
        - name: git-sync-secret-volume
          secret:
            secretName: git-sync-secret
            items:
              - key: password
                path: password
