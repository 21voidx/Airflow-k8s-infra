apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      serviceAccountName: airflow
      initContainers:
        - name: wait-for-init          # ← 1. Tunggu DB migrate selesai
          image: bitnami/kubectl:latest
          command:
            - kubectl
            - wait
            - --for=condition=complete
            - job/airflow-init
            - --timeout=300s
        - name: git-sync-init
          image: registry.k8s.io/git-sync/git-sync:v4.4.0
          envFrom:
            - configMapRef:
                name: git-sync-config
          env:
            - name: GITSYNC_ONE_TIME
              value: "true"
            - name: GITSYNC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: git-sync-secret
                  key: username
            - name: GITSYNC_PASSWORD_FILE
              value: /etc/git-secret/password
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
            - name: git-sync-secret-volume
              mountPath: /etc/git-secret
              readOnly: true
      containers:
        - name: scheduler
          image: AIRFLOW_IMAGE
          imagePullPolicy: IfNotPresent
          command: ["bash", "-ec", "exec airflow scheduler"]
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secret
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
            - name: logs
              mountPath: /opt/airflow/logs
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import sys
                  from airflow.jobs.job import Job
                  from airflow.utils.db import create_session
                  with create_session() as session:
                      job = session.query(Job).filter(
                          Job.job_type == "SchedulerJob",
                          Job.state == "running",
                      ).first()
                  sys.exit(0 if job else 1)
            initialDelaySeconds: 60
            periodSeconds: 300
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8974
            initialDelaySeconds: 120   # wait for scheduler to register heartbeat
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.4.0
          envFrom:
            - configMapRef:
                name: git-sync-config
          env:
            - name: GITSYNC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: git-sync-secret
                  key: username
            - name: GITSYNC_PASSWORD_FILE
              value: /etc/git-secret/password
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
            - name: git-sync-secret-volume
              mountPath: /etc/git-secret
              readOnly: true
      volumes:
        - name: git-sync-data
          emptyDir: {}
        - name: logs
          persistentVolumeClaim:
            claimName: airflow-logs
        - name: git-sync-secret-volume
          secret:
            secretName: git-sync-secret
            items:
              - key: password
                path: password
