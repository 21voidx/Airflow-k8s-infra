apiVersion: v1
kind: Service
metadata:
  name: airflow-api-server
  namespace: airflow
spec:
  type: NodePort          # ← tambah ini
  selector:
    app: airflow-api-server
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081      # ← port yang bisa diakses dari luar (sesuaikan keinginan)

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-api-server
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-api-server
  template:
    metadata:
      labels:
        app: airflow-api-server
    spec:
      serviceAccountName: airflow
      initContainers:
        - name: wait-for-init          # ← 1. Tunggu DB migrate selesai
          image: bitnami/kubectl:latest
          command:
            - kubectl
            - wait
            - --for=condition=complete
            - job/airflow-init
            - --timeout=300s
        - name: git-sync-init
          image: registry.k8s.io/git-sync/git-sync:v4.4.0
          envFrom:
            - configMapRef:
                name: git-sync-config
          env:
            - name: GITSYNC_ONE_TIME
              value: "true"
            - name: GITSYNC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: git-sync-secret
                  key: username
            - name: GITSYNC_PASSWORD_FILE
              value: /etc/git-secret/password
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
            - name: git-sync-secret-volume
              mountPath: /etc/git-secret
              readOnly: true
      containers:
        - name: api-server
          image: apache/airflow:3.0.6-python3.12
          imagePullPolicy: IfNotPresent
          command: ["bash", "-ec", "exec airflow api-server"]
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secret
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
            - name: airflow-logs
              mountPath: /opt/airflow/logs
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.4.0
          envFrom:
            - configMapRef:
                name: git-sync-config
          env:
            - name: GITSYNC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: git-sync-secret
                  key: username
            - name: GITSYNC_PASSWORD_FILE
              value: /etc/git-secret/password
          volumeMounts:
            - name: git-sync-data
              mountPath: /git
            - name: git-sync-secret-volume
              mountPath: /etc/git-secret
              readOnly: true
            - name: airflow-logs
              mountPath: /opt/airflow/logs
          livenessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
      volumes:
        - name: git-sync-data
          emptyDir: {}
        - name: logs
          persistentVolumeClaim:
            claimName: airflow-logs
        - name: git-sync-secret-volume
          secret:
            secretName: git-sync-secret
            items:
              - key: password
                path: password
