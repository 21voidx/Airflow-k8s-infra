name: Deploy Development

on:
  push:
    branches:
      - dev

concurrency:
  group: airflow-dev-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/airflow-custom
  AIRFLOW_VERSION: 3.0.6

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          docker build -t ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG} .
          docker push ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:github-actions
          hostname: gh-dev-${{ github.run_id }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Setup kustomize
        run: |
          curl -sL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz | tar xz
          sudo mv kustomize /usr/local/bin/kustomize

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Ensure namespace exists
        run: kubectl get ns airflow-dev || kubectl create ns airflow-dev

      - name: Apply Airflow secret manifest
        run: |
          echo "${{ secrets.AIRFLOW_DEV_SECRET_YAML_B64 }}" | base64 -d > /tmp/airflow-secret.yaml
          kubectl apply -f /tmp/airflow-secret.yaml

      - name: Apply git-sync secret manifest
        run: |
          echo "${{ secrets.AIRFLOW_DEV_GITSYNC_SECRET_YAML_B64 }}" | base64 -d > /tmp/git-sync-secret.yaml
          kubectl apply -f /tmp/git-sync-secret.yaml

      - name: Set image for development overlay
        run: |
          cd k8s/overlays/development
          kustomize edit set image AIRFLOW_IMAGE=${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}

      - name: Deploy development
        run: kustomize build k8s/overlays/development | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/airflow-postgres -n airflow-dev --timeout=300s
          kubectl rollout status deployment/airflow-redis -n airflow-dev --timeout=300s
          kubectl rollout status deployment/airflow-api-server -n airflow-dev --timeout=300s
          kubectl rollout status deployment/airflow-scheduler -n airflow-dev --timeout=300s
          kubectl rollout status deployment/airflow-dag-processor -n airflow-dev --timeout=300s
          kubectl rollout status deployment/airflow-worker -n airflow-dev --timeout=300s
          kubectl rollout status deployment/airflow-triggerer -n airflow-dev --timeout=300s

      - name: Check scheduler health
        run: kubectl exec deploy/airflow-scheduler -n airflow-dev -- airflow jobs check --job-type SchedulerJob
